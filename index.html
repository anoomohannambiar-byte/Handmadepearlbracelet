<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handmade Pearls</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fffafc;
    color: #222;
}

header {
    text-align: center;
    padding: 20px;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    letter-spacing: 2px;
}

.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
    text-align: center;
}

.price {
    color: #d63384;
    font-weight: bold;
    margin: 5px 0;
}

button {
    background: black;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 20px;
    background: black;
    color: white;
}
</style>
</head>

<body>

<header>Handmade Pearls</header>

<section class="hero">
    <h1>Luxury Handmade Bracelets</h1>
    <p>Crafted with love & elegance ✨</p>
</section>

<section class="products">

<div class="card">
    <img src="pink.jpg">
    <div class="card-content">
        <h3>Soft Pink Pearl</h3>
        <p class="price">₹299</p>
        <button onclick="payNow(299)">Buy Now</button>
    </div>
</div>

<div class="card">
    <img src="multi.jpg">
    <div class="card-content">
        <h3>Colorful Bead Bracelet</h3>
        <p class="price">₹349</p>
        <button onclick="payNow(349)">Buy Now</button>
    </div>
</div>

<div class="card">
    <img src="flower.jpg">
    <div class="card-content">
        <h3>Floral Charm Bracelet</h3>
        <p class="price">₹399</p>
        <button onclick="payNow(399)">Buy Now</button>
    </div>
</div>

<div class="card">
    <img src="white.jpg">
    <div class="card-content">
        <h3>Classic White Pearl</h3>
        <p class="price">₹279</p>
        <button onclick="payNow(279)">Buy Now</button>
    </div>
</div>

</section>

<footer>
    Instagram: @yourshop | WhatsApp: yournumber
</footer>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function payNow(amount) {
    var options = {
        "key": "YOUR_RAZORPAY_KEY",
        "amount": amount * 100,
        "currency": "INR",
        "name": "Handmade Pearls",
        "description": "Bracelet Purchase",
        "handler": function (response){
            alert("Payment Successful!");
        },
        "theme": {
            "color": "#d63384"
        }
    };
    var rzp1 = new Razorpay(options);
    rzp1.open();
}
</script>

</body>
</html>
